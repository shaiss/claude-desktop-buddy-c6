; Waveshare ESP32-C6-LCD-1.47 port of claude-desktop-buddy.
; pioarduino fork: upstream platform-espressif32 has no Arduino-ESP32 3.x,
; which ESP32-C6 requires.
[env:waveshare-c6-lcd-147]
platform = https://github.com/pioarduino/platform-espressif32.git#develop
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
; Port resolved dynamically by VID:PID 303A:1001 (has flapped COM12<->COM13)
extra_scripts = pre:tools/auto_port.py
; pyserial asserts DTR/RTS on open, which can reset a USB-Serial/JTAG chip
; into the bootloader mid-monitor.
monitor_dtr = 0
monitor_rts = 0
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
; ESP32-C6FH8: 8 MB embedded flash (Waveshare wiki says 4 MB — wrong for this SKU)
board_upload.flash_size = 8MB
build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; Route Serial to the native USB Serial/JTAG (HWCDC). The devkitc-1 board
    ; json doesn't set these, and without them Serial goes to UART0 pins.
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    h2zero/NimBLE-Arduino @ ^2.2.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
